spring:
  application:
    name: HRStack
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 30000
      max-lifetime: 12000000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_updates: true
        order_inserts: true
        multi_tenancy: SCHEMA
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration/common
    schemas: public
    table: flyway_schema_history
    validate-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 465
    username: multitenantbank@gmail.com
    password: dhmj rivz ftmg osoo
    properties:
      mail:
       smtp:
        auth: true
#        starttls:
#            enable: true
#            required: true
        ssl:
          enable: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

app:
  jwt:
    private-key-path: certs/private_key.pem
    public-key-path: certs/public_key.pem
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

  workspace:
    base-url: https://hrstack.app/

springdoc:
  default-produces-media-type: application/json
  swagger-ui:
    enabled: true
    operations-sorter: true
    tags-sorter: alpha

cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${API_KEY}
  api-secret: ${API_SECRET}

logging:
  level:
    org.springframework.security: DEBUG



